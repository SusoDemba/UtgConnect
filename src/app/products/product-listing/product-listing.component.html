<div class="container mt-4">
    <div class="row">
      <div
        class="col-md-4"
        *ngFor="let product of products"
      >
        <div class="card h-100">
          <img
            [src]="product.image"
            class="card-img-top"
            alt="{{ product.name }}"
          />
          <div class="card-body">
            <h5 class="card-title">{{ product.name }}</h5>
            <p class="card-text">{{ product.description }}</p>
            <p class="card-text text-primary">$ {{ product.price }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
