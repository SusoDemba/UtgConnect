<div class="container mt-4">
    <h2>Add New Product</h2>
    <form (ngSubmit)="onSubmit()" >
      <div class="mb-3">
        <label for="name" class="form-label">Product Name</label>
        <input
          type="text"
          id="name"
          class="form-control"
          
          name="name"
          autocomplete="name"
          required
        />
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea
          id="description"
          class="form-control"
          
          name="description"
          rows="3"
          required
        ></textarea>
      </div>
      <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input
          type="number"
          id="price"
          class="form-control"
          
          name="price"
          required
        />
      </div>
      <div class="mb-3">
        <label for="image" class="form-label">Image URL</label>
        <input
          type="text"
          id="image"
          class="form-control"
          
          name="image"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary" >
        Add Product
      </button>
    </form>
  </div>
